version: '3.8'

services:
  # Development Service configuration mapping local workspace files
  api_dev:
    image: node:20-slim
    container_name: barber360_api_dev
    working_dir: /usr/src/app
    command: npm run dev
    ports:
      - "3500:3500"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - BACKEND_PORT=3500
      - DATABASE_URL=postgres://barber_dev:devPassword123@postgres_db_dev:5432/barber360_dev
      - JWT_SECRET=DEV_LOCAL_JWT_SESSION_SECRET_KEY_998877
    depends_on:
      postgres_db_dev:
        condition: service_healthy

  # Dedicated Development PostgreSQL Client
  postgres_db_dev:
    image: postgres:15-alpine
    container_name: barber360_postgres_dev
    environment:
      - POSTGRES_USER=barber_dev
      - POSTGRES_PASSWORD=devPassword123
      - POSTGRES_DB=barber360_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_development_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barber_dev -d barber360_dev"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  postgres_development_data:
